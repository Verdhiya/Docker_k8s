apiVersion: v1
kind: Pod
metadata:
  name: complete-probes-demo
  labels:
    app: complete-demo
spec:
  containers:
  - name: app
    image: nginx
    ports:
    - containerPort: 80
    
    # STARTUP: Give 60 seconds to start (just in case)
    startupProbe:
      httpGet:
        path: /
        port: 80
      periodSeconds: 10
      failureThreshold: 6      # 60 seconds max
    
    # LIVENESS: Check every 10s if alive
    livenessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 0    # Startup handles initial wait
      periodSeconds: 10
      failureThreshold: 3
    
    # READINESS: Check if ready for traffic
    readinessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 5
      periodSeconds: 5
      failureThreshold: 2
